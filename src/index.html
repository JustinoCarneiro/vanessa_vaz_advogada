<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Montserrat', sans-serif; background: #3D5C5F; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 24px; }

  .grid { display: grid; grid-template-columns: repeat(3, 220px); gap: 16px; width: 100%; max-width: 700px; }
  a.card { display: flex; flex-direction: column; gap: 6px; text-decoration: none; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18); border-radius: 8px; padding: 22px 22px; transition: background 0.2s ease, transform 0.2s ease; }
  a.card:hover { background: rgba(189,228,218,0.16); transform: translateY(-3px); }
  a.card .n { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #BDE4DA; }
  a.card .t { font-size: 16px; font-weight: 600; color: #fff; }
  a.card .d { font-size: 12.5px; color: rgba(255,255,255,0.7); line-height: 1.4; }
  .foot { margin-top: 44px; font-size: 12.5px; color: rgba(255,255,255,0.6); text-align: center; }
  @media (max-width: 720px) { .grid { grid-template-columns: 1fr; max-width: 360px; } }
</style>
